name: deploy

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request_target:
    types: [labeled]
    branches: [main]

jobs:
  image:
    # Only run on push, manual dispatch, OR when the 'run-ci' label is added to a PR
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push' ||
      (github.event_name == 'pull_request_target' && github.event.label.name == 'run-ci')
    permissions:
      contents: write
    uses: ./.github/workflows/build-image.yml
    with:
      distro: all
    secrets:
      REMOTE_SSH_KEY: ${{ secrets.REMOTE_SSH_KEY }}
      REMOTE_SSH_CONFIG: ${{ secrets.REMOTE_SSH_CONFIG }}
      REMOTE_SSH_KNOWN_HOSTS: ${{ secrets.REMOTE_SSH_KNOWN_HOSTS }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
      R2_BUCKET: ${{ secrets.R2_BUCKET }}
